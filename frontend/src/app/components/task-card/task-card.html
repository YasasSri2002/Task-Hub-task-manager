<div class="bg-white rounded-lg border border-gray-200 p-4 hover:shadow-md transition-shadow">
  <div class="flex flex-col gap-3">
    <div class="flex items-start justify-between gap-2">
      <h3 class="text-base sm:text-lg flex-1 leading-snug">{{ task.title }}</h3>
      <div class="flex flex-wrap gap-1.5 shrink-0">
        <span class="px-2 py-1 rounded-full text-xs {{ statusColor }}">{{ statusLabel }}</span>
      </div>
    </div>

    <div class="flex flex-col sm:flex-row sm:items-end justify-between gap-3 pt-1">

        <div class="flex flex-wrap items-center gap-3">
          <span>Created: {{ task.createdAt | date:'medium' }}</span>
        </div>
      
      <div class="flex gap-1.5 shrink-0">
        @if(isNotCompleted){
            <button (click)="markComplete.emit(task.id)"
                class="p-2 text-green-600 hover:bg-green-50 rounded-md" title="Mark complete">
             <i class="fa-solid fa-check-double"></i>
            </button>
        }

        @if(isNotStarted){
            <button (click)="markInProgress.emit(task.id)"
                class="p-2 text-blue-600 hover:bg-blue-50 rounded-md" title="Mark in progress">
            <i class="fa-solid fa-hourglass-start"></i>
            </button>
        }

        @if(isNotStarted){
            <button (click)="edit.emit(task)"
                class="p-2 text-blue-800 hover:bg-blue-50 rounded-md" title="Edit">
                <i class="fa-solid fa-pen-to-square"></i>
            </button>
        }

        <button (click)="delete.emit(task.id)"
          class="p-2 text-red-600 hover:bg-red-50 rounded-md" title="Delete">
            <i class="fa-solid fa-trash"></i>
        </button>
      </div>
    </div>

    <div class="flex justify-end">
        <a [routerLink]="['/detailed-task', task.id]" class="flex gap-2 items-center text-blue-600 text-sm 
        active:scale-95 cursor-pointer">
            More Details <i class="fa-solid fa-arrow-right"></i>
        </a>
    </div>

  </div>
</div>
